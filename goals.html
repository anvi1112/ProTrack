<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProTrack — Goals</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
  <a href="index.html" class="logo">🌿 ProTrack</a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="habits.html">Habits</a>
    <a href="todo.html">To-Do</a>
    <a href="goals.html" class="active">Goals</a>
    <a href="progress.html">Progress</a>
    <a href="#" onclick="logoutUser()" class="btn-nav">Logout</a>
  </div>
</nav>

  <!-- GOALS BODY -->
  <div class="dashboard">

    <div class="page-header">
      <h2>🎯 My Goals</h2>
      <p>Set your targets and track how far you've come</p>
    </div>

    <!-- ADD GOAL -->
    <div class="add-habit-card">
      <h3>Add a New Goal</h3>
      <div class="add-goal-row">
        <input type="text" id="goalInput" placeholder="e.g. Complete internship project..." />
        <input type="number" id="goalProgress" placeholder="Progress % (0-100)" min="0" max="100" />
        <button onclick="addGoal()">+ Add Goal</button>
      </div>
    </div>

    <!-- GOAL LIST -->
    <div class="dash-card" style="margin-top: 24px;">
      <div class="dash-card-header">
        <h3>Active Goals</h3>
        <span id="goal-count">0 goals</span>
      </div>
      <div id="goalList"></div>
      <p class="empty-msg" id="goalEmptyMsg">No goals yet. Add one above! 🎯</p>
    </div>

  </div>


<script>
  // Show login nudge notification if not logged in
  window.addEventListener('load', () => {
    const loggedIn = localStorage.getItem('loggedInUser');
    if (!loggedIn) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 30px;
        right: 30px;
        background-color: #5C7A4E;
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        font-size: 0.9rem;
        font-family: 'Poppins', sans-serif;
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        z-index: 9999;
        max-width: 280px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      `;
      toast.innerHTML = `
        <p>🔔 Login for a better experience and to save your data!</p>
        <a href="login.html" style="background:white; color:#5C7A4E; padding:8px 16px; border-radius:20px; text-decoration:none; font-weight:600; text-align:center; font-size:0.85rem;">Login Now →</a>
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 6000);
    }
  });
</script>
 <script src="js/auth.js"></script>
<script>checkLogin();</script>
<script src="js/goals.js"></script>
</body>
</html>
