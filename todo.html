<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProTrack — To-Do List</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
 <nav class="navbar">
  <a href="index.html" class="logo">🌿 ProTrack</a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="habits.html">Habits</a>
    <a href="todo.html" class="active">To-Do</a>
    <a href="goals.html">Goals</a>
    <a href="progress.html">Progress</a>
    <a href="#" onclick="logoutUser()" class="btn-nav">Logout</a>
  </div>
</nav>

  <!-- TODO BODY -->
  <div class="dashboard">

    <div class="page-header">
      <h2>✅ My To-Do List</h2>
      <p>Plan your day, one task at a time</p>
    </div>

    <!-- NOTIFICATION BANNER -->
    <div class="reminder-banner" id="todoBanner">
      <span>🔔</span>
      <p>You haven't added any tasks yet! Add your first task below 🌱</p>
    </div>

    <!-- ADD TODO -->
    <div class="add-habit-card">
      <h3>Add a New Task</h3>
      <div class="add-todo-row">
        <input type="text" id="todoInput" placeholder="e.g. Submit assignment..." />
        <select id="todoPriority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
        <button onclick="addTodo()">+ Add Task</button>
      </div>
    </div>

    <!-- TODO LIST -->
    <div class="dash-card" style="margin-top: 24px;">
      <div class="dash-card-header">
        <h3>Today's Tasks</h3>
        <span id="todo-count">0 of 0 done</span>
      </div>
      <ul class="habit-list" id="todoList"></ul>
      <p class="empty-msg" id="todoEmptyMsg">No tasks yet. Add one above! ✅</p>
    </div>

  </div>

 
<script>
  // Show login nudge notification if not logged in
  window.addEventListener('load', () => {
    const loggedIn = localStorage.getItem('loggedInUser');
    if (!loggedIn) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 30px;
        right: 30px;
        background-color: #5C7A4E;
        color: white;
        padding: 16px 24px;
        border-radius: 12px;
        font-size: 0.9rem;
        font-family: 'Poppins', sans-serif;
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        z-index: 9999;
        max-width: 280px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      `;
      toast.innerHTML = `
        <p>🔔 Login for a better experience and to save your data!</p>
        <a href="login.html" style="background:white; color:#5C7A4E; padding:8px 16px; border-radius:20px; text-decoration:none; font-weight:600; text-align:center; font-size:0.85rem;">Login Now →</a>
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 6000);
    }
  });
</script>
 <script src="js/auth.js"></script>
  <script>checkLogin();</script>
  <script src="js/todo.js"></script>
</body>
</html>
