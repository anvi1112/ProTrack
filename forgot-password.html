<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProTrack — Reset Password</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo">🌿 ProTrack</a>
    <div class="nav-links">
      <a href="login.html" class="btn-nav">Back to Login</a>
    </div>
  </nav>

  <!-- RESET SECTION -->
  <section class="auth-section">
    <div class="auth-card">

      <div class="auth-header">
        <h2>Reset Password 🔑</h2>
        <p>Enter your email to verify your account</p>
      </div>

      <div class="auth-form" id="step1">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="resetEmail" placeholder="you@email.com" autocomplete="off" />
        </div>
        <button class="btn-submit" onclick="verifyEmail()">Verify Email →</button>
        <p id="resetMsg1"></p>
      </div>

      <div class="auth-form" id="step2" style="display:none;">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="confirmNewPassword" placeholder="Repeat new password" autocomplete="new-password" />
        </div>
        <button class="btn-submit" onclick="resetPassword()">Reset Password →</button>
        <p id="resetMsg2"></p>
      </div>

      <p class="switch-auth">
        Remember your password?
        <a href="login.html">Login here</a>
      </p>

    </div>
  </section>

  <script src="js/auth.js"></script>
  <script src="js/forgot-password.js"></script>

</body>
</html>
