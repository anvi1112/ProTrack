<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProTrack — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
  <a href="index.html" class="logo">🌿 ProTrack</a>
  <div class="nav-links">
    <a href="login.html" class="active">Login</a>
    <a href="register.html" class="btn-nav">Register</a>
  </div>
</nav>

  <!-- LOGIN SECTION -->
  <section class="auth-section">
    <div class="auth-card">

      <div class="auth-header">
        <h2>Welcome Back 🌱</h2>
        <p>Log in to continue your journey</p>
      </div>

      <div class="auth-form">

          <div class="form-group">
           <label>Email Address</label>
           <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="off" />
          </div>

          <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="new-password" />
          </div>

          <div class="form-footer-link">
            <a href="forgot-password.html">Forgot password?</a>
          </div>

         <button class="btn-submit" onclick="loginUser()">Login →</button>

          <p id="loginMsg"></p>

          <p class="switch-auth">
          Don't have an account?
          <a href="register.html">Sign up here</a>
          </p>

        </div>
    </div>
  </section>
<script type="module">
  import { loginUser } from './js/auth.js';
  window.loginUser = loginUser;
</script>
</body>
</html>
